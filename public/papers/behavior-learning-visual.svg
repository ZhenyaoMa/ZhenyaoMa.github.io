<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 540" role="img" aria-labelledby="title desc">
  <title id="title">Behavior Learning research figure</title>
  <desc id="desc">Observed data are mapped to learned optimization structures and a compact symbolic representation.</desc>
  <rect width="720" height="540" fill="#f8f9fb"/>
  <rect x="30" y="30" width="660" height="480" rx="4" fill="#ffffff" stroke="#dfe3e8"/>
  <text x="58" y="75" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#151515">Behavior Learning</text>
  <text x="58" y="101" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b7280">Learning optimization structures from observed data</text>

  <g transform="translate(58 158)">
    <rect width="150" height="204" rx="2" fill="#f4f6f8" stroke="#d7dce2"/>
    <text x="18" y="31" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2d3748">Observed data</text>
    <circle cx="37" cy="79" r="7" fill="#1769d2"/>
    <circle cx="72" cy="112" r="7" fill="#1769d2" opacity=".76"/>
    <circle cx="111" cy="72" r="7" fill="#1769d2" opacity=".58"/>
    <circle cx="54" cy="158" r="7" fill="#1769d2" opacity=".45"/>
    <circle cx="119" cy="151" r="7" fill="#1769d2" opacity=".88"/>
    <path d="M25 178 C52 120, 91 133, 126 57" fill="none" stroke="#7c8797" stroke-width="2"/>
  </g>

  <path d="M226 260 H279" fill="none" stroke="#929aa6" stroke-width="2"/>
  <path d="M268 251 L280 260 L268 269" fill="none" stroke="#929aa6" stroke-width="2"/>

  <g transform="translate(296 143)">
    <rect width="150" height="234" rx="2" fill="#f4f6f8" stroke="#d7dce2"/>
    <text x="18" y="31" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2d3748">Optimization structure</text>
    <rect x="27" y="63" width="96" height="39" rx="5" fill="#e8f1fd" stroke="#1769d2"/>
    <text x="75" y="87" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#123e72">U₁(x, y)</text>
    <rect x="27" y="119" width="96" height="39" rx="5" fill="#edf3ee" stroke="#738675"/>
    <text x="75" y="143" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#425744">U₂(z)</text>
    <rect x="27" y="175" width="96" height="39" rx="5" fill="#f7efe8" stroke="#a47d5d"/>
    <text x="75" y="199" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#6c4d35">arg max</text>
    <line x1="75" y1="102" x2="75" y2="119" stroke="#929aa6"/>
    <line x1="75" y1="158" x2="75" y2="175" stroke="#929aa6"/>
  </g>

  <path d="M463 260 H516" fill="none" stroke="#929aa6" stroke-width="2"/>
  <path d="M505 251 L517 260 L505 269" fill="none" stroke="#929aa6" stroke-width="2"/>

  <g transform="translate(534 158)">
    <rect width="128" height="204" rx="2" fill="#f4f6f8" stroke="#d7dce2"/>
    <text x="17" y="31" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2d3748">Compact law</text>
    <text x="64" y="83" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#123e72">U(x, y)</text>
    <path d="M25 111 H103" stroke="#b1b7c0"/>
    <text x="17" y="140" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555f6d">Prediction</text>
    <text x="17" y="163" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555f6d">Interpretation</text>
    <text x="17" y="186" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555f6d">Identifiability</text>
  </g>

  <text x="58" y="448" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b7280">A compositional utility framework for scientific domains involving optimization.</text>
</svg>
