<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 540" role="img" aria-labelledby="title desc">
  <title id="title">Human social preferences research figure</title>
  <desc id="desc">Decision complexity affects active social consideration and observed choices.</desc>
  <rect width="720" height="540" fill="#f8f9fb"/>
  <rect x="30" y="30" width="660" height="480" rx="4" fill="#ffffff" stroke="#dfe3e8"/>
  <text x="58" y="75" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#151515">Human Social Preferences</text>
  <text x="58" y="101" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b7280">Simple and complex decisions</text>

  <g transform="translate(58 155)">
    <rect width="154" height="214" rx="2" fill="#f4f6f8" stroke="#d7dce2"/>
    <text x="18" y="31" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2d3748">Decision problem</text>
    <rect x="25" y="62" width="104" height="46" rx="4" fill="#e8f1fd" stroke="#1769d2"/>
    <text x="77" y="90" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#123e72">Simple</text>
    <rect x="25" y="132" width="104" height="46" rx="4" fill="#f2ece7" stroke="#9a765a"/>
    <text x="77" y="160" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#684b36">Complex</text>
  </g>

  <path d="M230 262 H282" fill="none" stroke="#929aa6" stroke-width="2"/>
  <path d="M271 253 L283 262 L271 271" fill="none" stroke="#929aa6" stroke-width="2"/>

  <g transform="translate(300 139)">
    <rect width="164" height="246" rx="2" fill="#f4f6f8" stroke="#d7dce2"/>
    <text x="18" y="31" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2d3748">Social consideration</text>
    <circle cx="82" cy="92" r="34" fill="#ffffff" stroke="#1769d2" stroke-width="2"/>
    <circle cx="69" cy="86" r="8" fill="#1769d2"/>
    <circle cx="96" cy="86" r="8" fill="#738675"/>
    <path d="M61 111 C73 121, 91 121, 103 111" fill="none" stroke="#7c8797" stroke-width="2"/>
    <line x1="82" y1="127" x2="82" y2="155" stroke="#929aa6"/>
    <path d="M50 176 H114" stroke="#929aa6"/>
    <text x="82" y="203" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555f6d">Active consideration</text>
    <text x="82" y="222" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555f6d">depends on complexity</text>
  </g>

  <path d="M482 262 H534" fill="none" stroke="#929aa6" stroke-width="2"/>
  <path d="M523 253 L535 262 L523 271" fill="none" stroke="#929aa6" stroke-width="2"/>

  <g transform="translate(552 155)">
    <rect width="110" height="214" rx="2" fill="#f4f6f8" stroke="#d7dce2"/>
    <text x="16" y="31" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#2d3748">Observed choice</text>
    <circle cx="55" cy="83" r="24" fill="#e8f1fd" stroke="#1769d2"/>
    <text x="55" y="88" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#123e72">Pro-social</text>
    <circle cx="55" cy="151" r="24" fill="#f2ece7" stroke="#9a765a"/>
    <text x="55" y="156" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#684b36">Selfish</text>
  </g>

  <text x="58" y="448" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b7280">Stable preferences can produce different behavior as decision complexity changes.</text>
</svg>
